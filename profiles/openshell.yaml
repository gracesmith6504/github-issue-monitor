    reason: "1-line fix in build.rs — change glob pattern. Exact change spelled out, no Rust knowledge needed."
  - number: 1339
    scores: "SP=5 Scope=5 Fam=5"
    reason: "Replace '--sync' with '--upload .' in one doc file. No Rust, no codebase knowledge."
  - number: 2173
    scores: "SP=5 Scope=4 Fam=3"
    reason: "Certgen EXDEV fix — exact file and line given, 1 crate, but need to read the function to implement the fix correctly in Rust."
  - number: 2095
    scores: "SP=4 Scope=4 Fam=5"
    reason: "Helm template fix — add an if-check. No Rust, no codebase knowledge, well-diagnosed."
  - number: 1347
    scores: "SP=3 Scope=3 Fam=3"
    reason: "Provider validation split — 2 files, 67 lines, but required understanding gRPC validation patterns."
  - number: 1425
    scores: "SP=3 Scope=2 Fam=2"
    reason: "Symlink upload — looked simple but needed 296 lines across 4 files in CLI internals. Community attempt was rejected."
  - number: 2309
    scores: "SP=3 Scope=2 Fam=2"
    reason: "Symlink regression — same subsystem as #1425, root cause identified but fix requires understanding upload planner internals."
  - number: 2304
    scores: "SP=2 Scope=2 Fam=1"
    reason: "Refactor a 10,103-line file into modules. Must understand every function to know where it belongs. Scope is huge despite being 'one crate'."
  - number: 1358
    scores: "SP=2 Scope=1 Fam=1"
    reason: "macOS gateway crash-loop — cross-platform networking, 15 files, deep architectural knowledge needed."

auto_label: false

label_map:
  "JUMP ON IT": "good first issue"
  "GO FOR IT": "good first issue"

verdict_thresholds:
  "JUMP ON IT": 13
  "GO FOR IT": 10
  "STRETCH": 7
  "LONG SHOT": 5
