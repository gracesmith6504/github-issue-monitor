repos:
  - "NVIDIA/OpenShell"

calibration: |
  CRITICAL context for this repository:
  - Issues are written by AI agents and are ALL detailed with file paths,
    line numbers, reproduction steps, and root cause analysis. Detail does
    NOT mean the issue is easy — it means the filing agent was thorough.
    Do NOT let detailed issue descriptions push the verdict UP.
  - This is a 21-crate Rust workspace (~8.8M lines). The number of CRATES
    touched matters more than the number of files. A change in one isolated
    crate may be trivial; a change spanning crates requires understanding
    dependency relationships that a newcomer cannot learn quickly.
  - The project has a vouch gate — first-time external contributors must get
    a maintainer to /vouch them before any PR is accepted.

architecture: |
  Subsystem isolation (least to most interconnected):
  - Docs/examples: No Rust needed. Always safe for newcomers.
  - openshell-tui (18 files): Terminal UI dashboard, isolated, few dependencies. Self-contained changes.
  - openshell-cli (17 files): CLI frontend, mostly isolated. Safe for newcomers who know Rust basics.
  - openshell-policy (3 files): Policy parsing, small and focused. Depends only on core.
  - openshell-router (5 files): Inference routing, small and focused. Depends only on core.
  - openshell-driver-docker (2 files): Simplest compute driver. Depends only on core.
  - openshell-bootstrap (9 files): Gateway registration, auth tokens. Moderate complexity.
  - openshell-supervisor-process (19 files): SSH server, process spawning, privilege drop. NOT newcomer-friendly.
  - openshell-supervisor-network (26 files): L7 proxy, OPA policy, inference routing. Hard.
  - openshell-server (59 files, depends on 12 other crates): The gateway hub. ANY issue touching this is STRETCH at minimum.
  - openshell-core (30 files): Foundation crate — every other crate depends on it. Changes here cascade everywhere. LONG SHOT or NOT YET.

domains: |
  Hard domains (push verdict DOWN even when file paths are given):
  - SSH/PTY handling, session lifecycle, channel management
  - Landlock/seccomp sandboxing, security policy enforcement
  - gRPC API changes touching proto definitions in proto/
  - Cross-crate refactoring or new abstractions
  - Network proxy internals, L7 policy evaluation, TLS termination
  - Concurrency, async lifecycles, race conditions
  - Multi-platform issues (macOS vs Linux driver differences)

  Easier domains (don't push down):
  - Documentation and examples (no Rust needed)
  - Build system fixes (build.rs, Cargo.toml, mise tasks)
  - CLI flag additions or changes in openshell-cli
  - TUI layout, styling, or navigation in openshell-tui
  - Single-crate bug fixes with clear error messages and isolated scope
  - Test additions following existing patterns

examples:
  - number: 832
    verdict: "JUMP ON IT"
    reason: "1-line fix in build.rs — change glob pattern from 'v*' to 'v[0-9]*'. Root cause fully diagnosed in issue. Multiple people independently submitted the same fix."
  - number: 1339
    verdict: "JUMP ON IT"
    reason: "Replace '--sync' with '--upload .' in one documentation file. No Rust, no codebase knowledge, no tests needed."
  - number: 2173
    verdict: "GO FOR IT"
    reason: "Certgen EXDEV fix — exact file and line given (certgen.rs L680), one function to change (std::fs::rename to copy+delete), Rust but contained to a single crate."
  - number: 1347
    verdict: "STRETCH"
    reason: "Provider update validation split — 2 files, 67 lines, required understanding gRPC validation patterns and writing regression tests. No newcomer picked it up."
  - number: 1425
    verdict: "LONG SHOT"
    reason: "Symlink upload fix — looked simple but needed 296 lines across 4 files in CLI internals. Community attempt was rejected; maintainer had to write the fix."
  - number: 1358
    verdict: "NOT YET"
    reason: "macOS gateway crash-loop — cross-platform networking issue across multiple drivers. 15 files changed by core maintainer. Incorrectly labeled 'good first issue'."
  - number: 2095
    verdict: "GO FOR IT"
    reason: "Helm template conditional rendering — add an if-check around client_ca_path in one template file. Well-diagnosed, no Rust, no design decisions."
  - number: 2112
    verdict: "GO FOR IT"
    reason: "Build fix — add ulimit guard to mise task. Root cause fully diagnosed (macOS 256 fd limit vs 333 rlibs). Config change, not code."
  - number: 2304
    verdict: "LONG SHOT"
    reason: "Refactor a 10,103-line file into modules. Requires understanding every function to know where it belongs. No newcomer can safely decompose this."

label_map:
  "JUMP ON IT": "good first issue"
  "GO FOR IT": "good first issue"

verdict_overrides:
  "JUMP ON IT": "Fix is practically spelled out — exact file, exact line, mechanical change. 1 file, under 10 lines. No Rust knowledge needed, or trivial Rust (change a string/constant). Examples: docs typo, build.rs glob fix, config value change."
  "GO FOR IT": "The issue diagnoses the problem clearly enough that you know WHAT to change, not just WHERE to look. Fix is contained to 1-3 files. No design decisions — the approach is obvious from the issue description. Includes: Helm template fixes, build/config fixes with clear root cause, bug fixes with exact file and line numbers, features in isolated crates (openshell-tui, openshell-cli) where the path is obvious. Claude Code can navigate the code and write the fix."
  "STRETCH": "The issue describes the problem but the FIX requires making implementation choices — deciding between approaches, understanding existing patterns to maintain consistency, or working in a domain (SSH, networking, sandboxing) where Claude Code can explain syntax but cannot make the judgment calls. Touches 1-2 crates, 2-5 files. Still doable with patience but you will need to study the codebase."
  "LONG SHOT": "Requires deep domain expertise, OR a large refactor where you must understand thousands of lines to restructure safely, OR cross-crate design changes, OR touches security-critical paths (openshell-supervisor-process, openshell-supervisor-network, openshell-core). Real risk of spending days stuck even with AI tools."
  "NOT YET": "New subsystems, architectural redesign, RFC-level work, or changes that require months of project context to even understand the constraints. Examples: new compute drivers, new API surfaces, build system overhaul."
