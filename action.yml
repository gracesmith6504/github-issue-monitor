name: 'Newcomer Issue Assessment'
description: 'Assess GitHub issues for newcomer-friendliness using an LLM and apply verdict labels'

inputs:
  github-token:
    description: 'GitHub token with issues:write permission'
    required: true
  llm-provider:
    description: 'LLM provider: github (default, OpenAI-compatible), anthropic (Anthropic API), or vertex (Google Vertex AI)'
    required: false
    default: 'github'
  llm-token:
    description: 'API key for the LLM endpoint (required for github provider, the default)'
    required: false
    default: ''
  llm-endpoint:
    description: 'OpenAI-compatible API endpoint URL (github provider only, default: GitHub Models)'
    required: false
    default: 'https://models.github.ai/inference'
  llm-model:
    description: 'LLM model (default: auto per provider — gpt-4o for github, claude-sonnet-4-6 for anthropic/vertex)'
    required: false
    default: ''
  anthropic-api-key:
    description: 'Anthropic API key (required when llm-provider is anthropic)'
    required: false
    default: ''
  vertex-project-id:
    description: 'Google Cloud project ID (required when llm-provider is vertex)'
    required: false
    default: ''
  vertex-region:
    description: 'Google Cloud region for Vertex AI (default: us-east5)'
    required: false
    default: 'us-east5'
  min-verdict:
    description: 'Minimum verdict to apply a label (JUMP ON IT, GO FOR IT, STRETCH, LONG SHOT, NOT YET)'
    required: false
    default: 'STRETCH'
  repo-profile:
    description: 'Name of the repo profile for calibrated assessment (e.g. "openshell"). If not set, uses generic assessment.'
    required: false
    default: ''
  issue-number:
    description: 'Issue number to assess (for workflow_dispatch). If not set, reads from the issue event.'
    required: false
    default: ''
  auto-label:
    description: 'Override profile auto_label setting. Set to "true" to apply labels directly.'
    required: false
    default: ''

outputs:
  verdict:
    description: 'The verdict string (e.g. GO FOR IT)'
    value: ${{ steps.assess.outputs.verdict }}
  summary:
    description: 'One-line summary of the assessment'
    value: ${{ steps.assess.outputs.summary }}
  label:
    description: 'The label that was applied (e.g. newcomer:go-for-it)'
    value: ${{ steps.assess.outputs.label }}

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/requirements.txt
        if [ "${{ inputs.llm-provider }}" = "anthropic" ] || [ "${{ inputs.llm-provider }}" = "vertex" ]; then
          pip install 'anthropic[vertex]>=0.39.0'
        fi

    - name: Assess issue
      id: assess
      shell: bash
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_LLM_PROVIDER: ${{ inputs.llm-provider }}
        INPUT_LLM_TOKEN: ${{ inputs.llm-token }}
        INPUT_LLM_ENDPOINT: ${{ inputs.llm-endpoint }}
        INPUT_LLM_MODEL: ${{ inputs.llm-model }}
        INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        INPUT_VERTEX_PROJECT_ID: ${{ inputs.vertex-project-id }}
        INPUT_VERTEX_REGION: ${{ inputs.vertex-region }}
        INPUT_MIN_VERDICT: ${{ inputs.min-verdict }}
        INPUT_REPO_PROFILE: ${{ inputs.repo-profile }}
        INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
        INPUT_AUTO_LABEL: ${{ inputs.auto-label }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PYTHONPATH: ${{ github.action_path }}
      run: python -m app.modes.action.main
