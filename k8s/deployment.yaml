apiVersion: apps/v1
kind: Deployment
metadata:
  name: issue-monitor
  namespace: issue-monitor
  labels:
    app: issue-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: issue-monitor
  template:
    metadata:
      labels:
        app: issue-monitor
    spec:
      containers:
        - name: issue-monitor
          image: quay.io/your-username/github-issue-monitor:latest
          envFrom:
            - configMapRef:
                name: issue-monitor-config
            - secretRef:
                name: github-token
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
