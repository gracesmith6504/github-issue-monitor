name: Issue Monitor

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ "${{ vars.LLM_PROVIDER }}" = "anthropic" ] || [ "${{ vars.LLM_PROVIDER }}" = "vertex" ]; then
            pip install 'anthropic[vertex]>=0.39.0'
          fi

      - name: Authenticate to Google Cloud
        if: vars.LLM_PROVIDER == 'vertex'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Compute LAST_CHECKED from previous run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(gh run list --workflow monitor.yml --status completed --json conclusion,startedAt \
            --jq '[.[] | select(.conclusion=="success")][0].startedAt' 2>/dev/null || echo "")
          if [ -n "$PREV" ] && [ "$PREV" != "null" ]; then
            echo "LAST_CHECKED=$PREV" >> "$GITHUB_ENV"
          else
            FALLBACK=$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
              || date -u -v-6H +%Y-%m-%dT%H:%M:%SZ)
            echo "LAST_CHECKED=$FALLBACK" >> "$GITHUB_ENV"
          fi

      - name: Run monitor (single pass)
        env:
          MONITOR_TOKEN: ${{ secrets.MONITOR_TOKEN || secrets.GITHUB_TOKEN }}
          NOTIFY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WATCH_REPOS: ${{ vars.WATCH_REPOS }}
          LAST_CHECKED: ${{ env.LAST_CHECKED }}
          NOTIFY_REPO: ${{ github.repository }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'github' }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERTEX_PROJECT_ID: ${{ vars.VERTEX_PROJECT_ID }}
          VERTEX_REGION: ${{ vars.VERTEX_REGION }}
          MIN_VERDICT: ${{ vars.MIN_VERDICT || 'STRETCH' }}
          RUN_ONCE: "true"
        run: python -m app.main
